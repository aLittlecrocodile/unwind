<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>打工小人 · 素材demo</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: linear-gradient(180deg, #fdf6ec 0%, #f7ecd9 100%);
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px 60px;
  }

  h1 {
    font-size: 18px;
    color: #6b5a44;
    margin: 0 0 4px;
  }
  .sub {
    font-size: 12px;
    color: #a8967d;
    margin-bottom: 24px;
  }

  .stage {
    position: relative;
    width: 320px;
    height: 320px;
    background: #fffaf1;
    border: 2px solid #eaddc4;
    border-radius: 24px;
    box-shadow: 0 8px 24px rgba(180, 150, 100, 0.15);
    overflow: hidden;
  }

  /* 气泡 */
  .bubble {
    position: absolute;
    top: 18px;
    left: 50%;
    transform: translateX(-50%);
    background: #fff;
    border: 2px solid #e7d6b8;
    border-radius: 14px;
    padding: 6px 14px;
    font-size: 13px;
    color: #7a6650;
    white-space: nowrap;
    opacity: 0;
    transition: opacity .25s ease, transform .25s ease;
  }
  .bubble.show {
    opacity: 1;
    animation: bubbleIn .3s ease;
  }
  @keyframes bubbleIn {
    from { transform: translateX(-50%) translateY(-6px) scale(.9); opacity: 0; }
    to   { transform: translateX(-50%) translateY(0) scale(1); opacity: 1; }
  }

  /* 桌子 */
  .desk {
    position: absolute;
    bottom: 70px;
    left: 50%;
    transform: translateX(-50%);
    width: 190px;
    height: 14px;
    background: #d8b98a;
    border-radius: 4px;
    box-shadow: 0 4px 0 #c4a274;
  }
  .desk::before, .desk::after {
    content: "";
    position: absolute;
    width: 10px;
    height: 40px;
    background: #c4a274;
    bottom: -40px;
  }
  .desk::before { left: 10px; }
  .desk::after  { right: 10px; }

  /* 电脑 */
  .laptop {
    position: absolute;
    bottom: 84px;
    left: 50%;
    transform: translateX(-50%);
    width: 54px;
    height: 34px;
  }
  .laptop .screen {
    width: 54px;
    height: 26px;
    background: #4a4038;
    border-radius: 4px 4px 0 0;
    position: relative;
    overflow: hidden;
  }
  .laptop .screen::before {
    content: "";
    position: absolute;
    inset: 3px;
    background: #7fd1c1;
    border-radius: 2px;
    opacity: .85;
  }
  .laptop .base {
    width: 62px;
    height: 6px;
    background: #5a4f45;
    border-radius: 0 0 4px 4px;
    margin-left: -4px;
  }

  /* 水杯（喝水状态用） */
  .cup {
    position: absolute;
    bottom: 86px;
    left: 50%;
    transform: translateX(28px);
    width: 16px;
    height: 20px;
    background: #cdeaf5;
    border: 2px solid #8fc6da;
    border-radius: 3px 3px 6px 6px;
    opacity: 0;
    transition: opacity .2s;
  }
  .stage[data-state="water"] .cup { opacity: 1; }

  /* 角色本体 */
  .buddy {
    position: absolute;
    bottom: 70px;
    left: 50%;
    transform: translateX(-50%);
    width: 70px;
    height: 100px;
  }

  .head {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 40px;
    height: 40px;
    background: #ffd9a0;
    border-radius: 50%;
    border: 2.5px solid #4a4038;
  }
  .face {
    position: absolute;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 13px;
    line-height: 1;
    color: #4a4038;
    white-space: nowrap;
    font-weight: 600;
  }
  .hair {
    position: absolute;
    top: -4px;
    left: 8px;
    width: 24px;
    height: 12px;
    background: #4a4038;
    border-radius: 50% 50% 0 0;
  }

  .torso {
    position: absolute;
    top: 36px;
    left: 50%;
    transform: translateX(-50%);
    width: 34px;
    height: 40px;
    background: #f4b942;
    border: 2.5px solid #4a4038;
    border-radius: 12px 12px 8px 8px;
  }
  .torso::before {
    /* 打工人马甲领口 */
    content: "";
    position: absolute;
    top: -2px;
    left: 50%;
    transform: translateX(-50%);
    width: 14px;
    height: 10px;
    background: #fffaf1;
    border-radius: 0 0 6px 6px;
  }

  .arm {
    position: absolute;
    top: 40px;
    width: 9px;
    height: 26px;
    background: #f4b942;
    border: 2.5px solid #4a4038;
    border-radius: 6px;
    transform-origin: top center;
  }
  .arm.left  { left: 10px; }
  .arm.right { right: 10px; }

  .legs {
    position: absolute;
    top: 74px;
    left: 50%;
    transform: translateX(-50%);
    width: 30px;
    height: 22px;
  }
  .leg {
    position: absolute;
    width: 10px;
    height: 22px;
    background: #4a4038;
    border-radius: 4px;
  }
  .leg.left  { left: 2px; }
  .leg.right { right: 2px; }

  /* 叠加特效 */
  .fx {
    position: absolute;
    font-size: 18px;
    opacity: 0;
    pointer-events: none;
  }
  .fx.sweat { top: -2px; left: 44px; }
  .fx.thirst { top: -6px; left: 42px; }
  .fx.spark { top: -10px; left: 50%; transform: translateX(-50%); }

  /* ===== 状态：专注打字 ===== */
  .stage[data-state="focus"] .arm.left  { animation: typeArmL .5s infinite ease-in-out; }
  .stage[data-state="focus"] .arm.right { animation: typeArmR .5s infinite ease-in-out .1s; }
  .stage[data-state="focus"] .torso { animation: breathe 2s infinite ease-in-out; }
  @keyframes typeArmL {
    0%,100% { transform: rotate(24deg); }
    50%     { transform: rotate(34deg); }
  }
  @keyframes typeArmR {
    0%,100% { transform: rotate(-24deg); }
    50%     { transform: rotate(-34deg); }
  }
  @keyframes breathe {
    0%,100% { transform: translateX(-50%) scaleY(1); }
    50%     { transform: translateX(-50%) scaleY(1.02); }
  }

  /* ===== 状态：伸懒腰休息 ===== */
  .stage[data-state="rest"] .buddy { animation: standUp .4s ease forwards; }
  .stage[data-state="rest"] .arm.left  { animation: stretchL 1.2s infinite ease-in-out; }
  .stage[data-state="rest"] .arm.right { animation: stretchR 1.2s infinite ease-in-out; }
  @keyframes standUp {
    from { bottom: 70px; } to { bottom: 78px; }
  }
  @keyframes stretchL {
    0%,100% { transform: rotate(-40deg); }
    50%     { transform: rotate(-170deg); }
  }
  @keyframes stretchR {
    0%,100% { transform: rotate(40deg); }
    50%     { transform: rotate(170deg); }
  }

  /* ===== 状态：趴桌疲惫 ===== */
  .stage[data-state="tired"] .buddy {
    animation: slump .6s ease forwards;
  }
  @keyframes slump {
    from { transform: translateX(-50%) rotate(0deg); }
    to   { transform: translateX(-50%) rotate(18deg) translateY(6px); }
  }
  .stage[data-state="tired"] .fx.sweat { opacity: 1; animation: sweatDrop 1.4s infinite; }
  @keyframes sweatDrop {
    0%   { opacity: 0; transform: translateY(0); }
    30%  { opacity: 1; }
    100% { opacity: 0; transform: translateY(10px); }
  }

  /* ===== 状态：喝水 ===== */
  .stage[data-state="water"] .arm.right {
    animation: drink 1s ease-in-out infinite;
  }
  @keyframes drink {
    0%,100% { transform: rotate(-24deg); }
    50%     { transform: rotate(-90deg); }
  }
  .stage[data-state="water"] .fx.thirst { opacity: 1; animation: pulse 1s infinite; }
  @keyframes pulse {
    0%,100% { opacity: .4; }
    50%     { opacity: 1; }
  }

  /* ===== 状态：完成庆祝 ===== */
  .stage[data-state="done"] .buddy { animation: jump .5s ease infinite; }
  @keyframes jump {
    0%,100% { bottom: 70px; }
    50%     { bottom: 100px; }
  }
  .stage[data-state="done"] .arm.left  { animation: cheerL .5s infinite ease-in-out; }
  .stage[data-state="done"] .arm.right { animation: cheerR .5s infinite ease-in-out; }
  @keyframes cheerL {
    0%,100% { transform: rotate(-150deg); }
    50%     { transform: rotate(-170deg); }
  }
  @keyframes cheerR {
    0%,100% { transform: rotate(150deg); }
    50%     { transform: rotate(170deg); }
  }
  .stage[data-state="done"] .fx.spark { opacity: 1; animation: sparkPop .6s infinite; }
  @keyframes sparkPop {
    0%   { opacity: 0; transform: translateX(-50%) translateY(4px) scale(.6); }
    50%  { opacity: 1; transform: translateX(-50%) translateY(-6px) scale(1.1); }
    100% { opacity: 0; transform: translateX(-50%) translateY(-14px) scale(.8); }
  }

  /* 电脑/桌子在休息/疲惫/喝水/庆祝时淡出重点，聚焦人物 */
  .stage[data-state="rest"] .laptop,
  .stage[data-state="done"] .laptop { opacity: .4; }

  /* 控制面板 */
  .panel {
    margin-top: 22px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    max-width: 360px;
  }
  button {
    border: none;
    background: #fff;
    border: 2px solid #eaddc4;
    color: #7a6650;
    padding: 8px 14px;
    border-radius: 10px;
    font-size: 13px;
    cursor: pointer;
    transition: all .15s;
  }
  button:hover { background: #fbeecb; }
  button.active {
    background: #f4b942;
    border-color: #d99f2b;
    color: #4a4038;
    font-weight: 600;
  }
</style>
</head>
<body>

<h1>打工小人 · 状态动画 Demo</h1>
<div class="sub">点击下方按钮切换状态，观察小人的动态反馈</div>

<div class="stage" data-state="focus" id="stage">
  <div class="bubble" id="bubble">在专心打字…</div>

  <div class="desk"></div>
  <div class="laptop">
    <div class="screen"></div>
    <div class="base"></div>
  </div>
  <div class="cup"></div>

  <div class="buddy" id="buddy">
    <div class="fx sweat">💦</div>
    <div class="fx thirst">🥤</div>
    <div class="fx spark">✨</div>

    <div class="head">
      <div class="hair"></div>
      <div class="face" id="face">^_^</div>
    </div>
    <div class="torso"></div>
    <div class="arm left"></div>
    <div class="arm right"></div>
    <div class="legs">
      <div class="leg left"></div>
      <div class="leg right"></div>
    </div>
  </div>
</div>

<div class="panel" id="panel">
  <button data-state="focus" data-face="^_^" data-text="在专心打字…" class="active">专注打字</button>
  <button data-state="rest"  data-face="~o~" data-text="这轮陪你打完啦，伸个懒腰～">伸懒腰休息</button>
  <button data-state="tired" data-face="-_-" data-text="救命，好酸…">趴桌疲惫</button>
  <button data-state="water" data-face=">_<" data-text="喝水时间到">举杯喝水</button>
  <button data-state="done"  data-face="^o^" data-text="今天的任务都完成啦！">完成庆祝</button>
</div>

<script>
  const stage = document.getElementById('stage');
  const bubble = document.getElementById('bubble');
  const face = document.getElementById('face');
  const buttons = document.querySelectorAll('#panel button');

  buttons.forEach(btn => {
    btn.addEventListener('click', () => {
      buttons.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      stage.dataset.state = btn.dataset.state;
      face.textContent = btn.dataset.face;

      bubble.classList.remove('show');
      // 触发重新入场动画
      void bubble.offsetWidth;
      bubble.textContent = btn.dataset.text;
      bubble.classList.add('show');
    });
  });

  // 初始气泡显示
  bubble.classList.add('show');
</script>

</body>
</html>
